app_name: polymarket001
mode: paper
live_trading_enabled: false
log:
  level: INFO
  json: true
metrics:
  enabled: true
  host: 0.0.0.0
  port: 9108
webhook:
  url: null
signal:
  default_size: 10.0
  taker_fee_estimate: 0.01
  slippage_estimate: 0.01
  execution_buffer: 0.005
  min_net_edge: 0.025
  ttl_ms: 2000
  probability_band: 500.0
risk:
  max_order_notional_pct: 0.05
  max_market_exposure_pct: 0.20
  max_daily_loss_pct: 0.05
  max_hourly_loss_pct: 0.02
  max_open_orders: 25
  max_orders_per_sec: 5
  max_cancel_per_sec: 10
  latency_kill_switch_ms: 500
  ws_disconnect_kill_after_sec: 20
  min_fill_ratio: 0.20
  max_error_rate_per_min: 10
  base_capital_usd: 10000
execution:
  order_type: FAK
  retry_attempts: 3
  retry_backoff_sec: 0.5
  reconciliation_interval_sec: 60
paper_broker:
  slippage_bps: 10
  fill_probability: 0.95
markets:
  - market_id: btc-15m-95000-above
    description: BTC above 95000 at 15m expiry
    strike_price: 95000
    settlement_side: above
    enabled: true
  - market_id: btc-15m-95500-above
    description: BTC above 95500 at 15m expiry
    strike_price: 95500
    settlement_side: above
    enabled: true

